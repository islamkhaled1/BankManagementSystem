name: C++ Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
      
    - name: Build
      run: |
        cl /EHsc FileName.cpp /Fe:BankSystem.exe
        
    - name: Test
      run: |
        echo "Build successful!"
